run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - prealloc

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
  revive:
    rules:
      - name: context-as-argument
      - name: error-return
      - name: error-naming

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
