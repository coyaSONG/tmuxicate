version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - misspell
    - revive
    - unconvert
    - prealloc
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    revive:
      rules:
        - name: context-as-argument
        - name: error-return
        - name: error-naming
  exclusions:
    max-issues-per-linter: 50
    max-same-issues: 10
